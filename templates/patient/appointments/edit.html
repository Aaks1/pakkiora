{% extends 'patient/base.html' %}
{% block title %}Edit Appointment{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto py-6">
    <div class="mb-4">
        <a href="{% url 'patient:past_appointments' %}" class="text-blue-600 hover:text-blue-800">
            <i class="fas fa-arrow-left mr-1"></i>Back to Appointments
        </a>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Edit Appointment</h1>
        <p class="text-sm text-gray-600 mb-6">
            Doctor: <strong>Dr. {{ doctor.first_name }} {{ doctor.last_name }}</strong>
        </p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                <select name="date" class="w-full px-3 py-2 border rounded-lg">
                    {% for d in available_dates %}
                        <option value="{{ d|date:'Y-m-d' }}" {% if selected_date_str == d|date:'Y-m-d' %}selected{% endif %}>
                            {{ d|date:"l, M d, Y" }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Time Slot</label>
                <select name="time" class="w-full px-3 py-2 border rounded-lg">
                    {% for slot in available_slots %}
                        <option value="{{ slot.start_time|time:'H:i' }}" {% if appointment.start_time|time:'H:i' == slot.start_time|time:'H:i' and selected_date_str == appointment.date|date:'Y-m-d' %}selected{% endif %}>
                            {{ slot.start_str }} - {{ slot.end_str }}
                        </option>
                    {% empty %}
                        <option value="">No slots available for selected date</option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex justify-end gap-3 pt-2">
                <a href="{% url 'patient:past_appointments' %}" class="px-4 py-2 border rounded-lg text-gray-700">Cancel</a>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
