{% extends 'patient/base.html' %}
{% load static %}

{% block title %}Find Doctors - Piki Ora Healthcare{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <!-- Welcome Section -->
    <div class="bg-white rounded-lg shadow-md p-6 mb-8">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Find a Doctor</h1>
                <p class="text-gray-600 mt-2">Browse our doctors and book appointments</p>
            </div>
            <div class="text-right">
                <a href="{% url 'patient:book_appointment' %}" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors">
                    <i class="fas fa-plus mr-2"></i>Quick Book
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
