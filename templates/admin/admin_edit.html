{% extends 'admin/base.html' %}
{% block title %}Edit Admin{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="{% url 'admin_list' %}" class="text-blue-600 hover:text-blue-800 transition-colors">
            <i class="fas fa-arrow-left mr-2"></i>Back to Admin List
        </a>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <h1 class="text-xl font-bold text-gray-900 mb-4">Edit Admin</h1>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
                    {% for error in form.non_field_errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-700 mb-1">First Name</label>
                    <input type="text" name="first_name" value="{{ form.first_name.value|default:admin.first_name }}" class="w-full px-3 py-2 border rounded-lg" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">Last Name</label>
                    <input type="text" name="last_name" value="{{ form.last_name.value|default:admin.last_name }}" class="w-full px-3 py-2 border rounded-lg" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">Username</label>
                    <input type="text" name="username" value="{{ form.username.value|default:admin.username }}" class="w-full px-3 py-2 border rounded-lg" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" value="{{ form.email.value|default:admin.email }}" class="w-full px-3 py-2 border rounded-lg" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">New Password</label>
                    <input type="password" name="password" class="w-full px-3 py-2 border rounded-lg" placeholder="Optional">
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">Confirm Password</label>
                    <input type="password" name="confirm_password" class="w-full px-3 py-2 border rounded-lg" placeholder="Optional">
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">Phone</label>
                    <input type="text" name="phone" value="{{ form.phone.value|default:'' }}" class="w-full px-3 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">Department</label>
                    <input type="text" name="department" value="{{ form.department.value|default:'' }}" class="w-full px-3 py-2 border rounded-lg">
                </div>
            </div>

            <div class="pt-4 flex justify-end gap-3">
                <a href="{% url 'admin_list' %}" class="px-4 py-2 border rounded-lg text-gray-700">Cancel</a>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
